name: Validate TLDs

on:
  pull_request:
    paths:
      - 'tlds.json'
      - 'tlds_meta.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --no-save ajv

      - name: Run validation
        run: node .github/scripts/validate.js